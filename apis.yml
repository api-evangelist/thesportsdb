aid: thesportsdb
name: TheSportsDB
description: >-
  An open, crowd-sourced sports database of artwork and metadata with a free sports API in JSON format. TheSportsDB
  provides data on sports leagues, teams, players, events, venues, and season standings across a wide range of sports
  worldwide including soccer, basketball, baseball, American football, hockey, tennis, and more.
