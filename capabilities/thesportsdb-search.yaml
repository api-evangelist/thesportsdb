naftiko: 1.0.0-alpha2
info:
  label: TheSportsDB API — Search
  description: 'TheSportsDB API — Search. 5 operations. Lead operation: Search All Leagues. Self-contained Naftiko capability
    covering one Thesportsdb business surface.'
  tags:
  - Thesportsdb
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    THESPORTSDB_API_KEY: THESPORTSDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: thesportsdb-search
    baseUri: https://www.thesportsdb.com/api/v1/json/3
    description: TheSportsDB API — Search business capability. Self-contained, no shared references.
    resources:
    - name: search_all_leagues.php
      path: /search_all_leagues.php
      operations:
      - name: searchallleagues
        method: GET
        description: Search All Leagues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: c
          in: query
          type: string
          description: Country name filter.
        - name: s
          in: query
          type: string
          description: Sport name filter.
    - name: searchevents.php
      path: /searchevents.php
      operations:
      - name: searchevents
        method: GET
        description: Search Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: e
          in: query
          type: string
          description: Event name (e.g., "Arsenal_vs_Chelsea").
        - name: s
          in: query
          type: string
          description: Season (e.g., 2026-2027).
    - name: searchplayers.php
      path: /searchplayers.php
      operations:
      - name: searchplayers
        method: GET
        description: Search Players
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: t
          in: query
          type: string
          description: Team name to search players within.
        - name: p
          in: query
          type: string
          description: Player name to search (e.g., "Danny_Welbeck").
    - name: searchteams.php
      path: /searchteams.php
      operations:
      - name: searchteams
        method: GET
        description: Search Teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: t
          in: query
          type: string
          description: Team name to search (e.g., Arsenal, Manchester United, Lakers). Free tier limited to "Arsenal" only.
        - name: sname
          in: query
          type: string
          description: Short name or abbreviation (e.g., ARS, NYK, LAL).
    - name: searchvenues.php
      path: /searchvenues.php
      operations:
      - name: searchvenues
        method: GET
        description: Search Venues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: t
          in: query
          type: string
          description: Venue name to search (e.g., Wembley, Anfield).
          required: true
  exposes:
  - type: rest
    namespace: thesportsdb-search-rest
    port: 8080
    description: REST adapter for TheSportsDB API — Search. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/search-all-leagues-php
      name: search-all-leagues-php
      description: REST surface for search_all_leagues.php.
      operations:
      - method: GET
        name: searchallleagues
        description: Search All Leagues
        call: thesportsdb-search.searchallleagues
        with:
          c: rest.c
          s: rest.s
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/searchevents-php
      name: searchevents-php
      description: REST surface for searchevents.php.
      operations:
      - method: GET
        name: searchevents
        description: Search Events
        call: thesportsdb-search.searchevents
        with:
          e: rest.e
          s: rest.s
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/searchplayers-php
      name: searchplayers-php
      description: REST surface for searchplayers.php.
      operations:
      - method: GET
        name: searchplayers
        description: Search Players
        call: thesportsdb-search.searchplayers
        with:
          t: rest.t
          p: rest.p
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/searchteams-php
      name: searchteams-php
      description: REST surface for searchteams.php.
      operations:
      - method: GET
        name: searchteams
        description: Search Teams
        call: thesportsdb-search.searchteams
        with:
          t: rest.t
          sname: rest.sname
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/searchvenues-php
      name: searchvenues-php
      description: REST surface for searchvenues.php.
      operations:
      - method: GET
        name: searchvenues
        description: Search Venues
        call: thesportsdb-search.searchvenues
        with:
          t: rest.t
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: thesportsdb-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for TheSportsDB API — Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: search-all-leagues
      description: Search All Leagues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-search.searchallleagues
      with:
        c: tools.c
        s: tools.s
      outputParameters:
      - type: object
        mapping: $.
    - name: search-events
      description: Search Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-search.searchevents
      with:
        e: tools.e
        s: tools.s
      outputParameters:
      - type: object
        mapping: $.
    - name: search-players
      description: Search Players
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-search.searchplayers
      with:
        t: tools.t
        p: tools.p
      outputParameters:
      - type: object
        mapping: $.
    - name: search-teams
      description: Search Teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-search.searchteams
      with:
        t: tools.t
        sname: tools.sname
      outputParameters:
      - type: object
        mapping: $.
    - name: search-venues
      description: Search Venues
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-search.searchvenues
      with:
        t: tools.t
      outputParameters:
      - type: object
        mapping: $.
