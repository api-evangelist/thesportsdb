naftiko: 1.0.0-alpha2
info:
  label: TheSportsDB API — Events
  description: 'TheSportsDB API — Events. 4 operations. Lead operation: Get Last Team Events. Self-contained Naftiko capability
    covering one Thesportsdb business surface.'
  tags:
  - Thesportsdb
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    THESPORTSDB_API_KEY: THESPORTSDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: thesportsdb-events
    baseUri: https://www.thesportsdb.com/api/v1/json/3
    description: TheSportsDB API — Events business capability. Self-contained, no shared references.
    resources:
    - name: eventslast.php
      path: /eventslast.php
      operations:
      - name: getlastteamevents
        method: GET
        description: Get Last Team Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: integer
          description: Team ID.
          required: true
    - name: eventsnext.php
      path: /eventsnext.php
      operations:
      - name: getnextteamevents
        method: GET
        description: Get Next Team Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: integer
          description: Team ID.
          required: true
    - name: eventsseason.php
      path: /eventsseason.php
      operations:
      - name: getseasonevents
        method: GET
        description: Get Season Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: integer
          description: League ID.
          required: true
        - name: s
          in: query
          type: string
          description: Season year (e.g., 2026-2027).
    - name: lookupevent.php
      path: /lookupevent.php
      operations:
      - name: lookupevent
        method: GET
        description: Lookup Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: integer
          description: Event ID.
          required: true
  exposes:
  - type: rest
    namespace: thesportsdb-events-rest
    port: 8080
    description: REST adapter for TheSportsDB API — Events. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/eventslast-php
      name: eventslast-php
      description: REST surface for eventslast.php.
      operations:
      - method: GET
        name: getlastteamevents
        description: Get Last Team Events
        call: thesportsdb-events.getlastteamevents
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eventsnext-php
      name: eventsnext-php
      description: REST surface for eventsnext.php.
      operations:
      - method: GET
        name: getnextteamevents
        description: Get Next Team Events
        call: thesportsdb-events.getnextteamevents
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eventsseason-php
      name: eventsseason-php
      description: REST surface for eventsseason.php.
      operations:
      - method: GET
        name: getseasonevents
        description: Get Season Events
        call: thesportsdb-events.getseasonevents
        with:
          id: rest.id
          s: rest.s
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookupevent-php
      name: lookupevent-php
      description: REST surface for lookupevent.php.
      operations:
      - method: GET
        name: lookupevent
        description: Lookup Event
        call: thesportsdb-events.lookupevent
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: thesportsdb-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for TheSportsDB API — Events. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-last-team-events
      description: Get Last Team Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-events.getlastteamevents
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-next-team-events
      description: Get Next Team Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-events.getnextteamevents
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-season-events
      description: Get Season Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-events.getseasonevents
      with:
        id: tools.id
        s: tools.s
      outputParameters:
      - type: object
        mapping: $.
    - name: lookup-event
      description: Lookup Event
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-events.lookupevent
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
