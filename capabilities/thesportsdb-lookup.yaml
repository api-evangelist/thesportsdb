naftiko: 1.0.0-alpha2
info:
  label: TheSportsDB API — Lookup
  description: 'TheSportsDB API — Lookup. 5 operations. Lead operation: Lookup Event. Self-contained Naftiko capability covering
    one Thesportsdb business surface.'
  tags:
  - Thesportsdb
  - Lookup
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    THESPORTSDB_API_KEY: THESPORTSDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: thesportsdb-lookup
    baseUri: https://www.thesportsdb.com/api/v1/json/3
    description: TheSportsDB API — Lookup business capability. Self-contained, no shared references.
    resources:
    - name: lookupevent.php
      path: /lookupevent.php
      operations:
      - name: lookupevent
        method: GET
        description: Lookup Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: integer
          description: Event ID.
          required: true
    - name: lookupleague.php
      path: /lookupleague.php
      operations:
      - name: lookupleague
        method: GET
        description: Lookup League
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: integer
          description: League ID.
          required: true
    - name: lookupplayer.php
      path: /lookupplayer.php
      operations:
      - name: lookupplayer
        method: GET
        description: Lookup Player
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: integer
          description: Player ID.
          required: true
    - name: lookuptable.php
      path: /lookuptable.php
      operations:
      - name: lookuptable
        method: GET
        description: Lookup Table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: l
          in: query
          type: integer
          description: League ID.
          required: true
        - name: s
          in: query
          type: string
          description: Season (e.g., 2026-2027).
    - name: lookupteam.php
      path: /lookupteam.php
      operations:
      - name: lookupteam
        method: GET
        description: Lookup Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: integer
          description: Team ID.
          required: true
  exposes:
  - type: rest
    namespace: thesportsdb-lookup-rest
    port: 8080
    description: REST adapter for TheSportsDB API — Lookup. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/lookupevent-php
      name: lookupevent-php
      description: REST surface for lookupevent.php.
      operations:
      - method: GET
        name: lookupevent
        description: Lookup Event
        call: thesportsdb-lookup.lookupevent
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookupleague-php
      name: lookupleague-php
      description: REST surface for lookupleague.php.
      operations:
      - method: GET
        name: lookupleague
        description: Lookup League
        call: thesportsdb-lookup.lookupleague
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookupplayer-php
      name: lookupplayer-php
      description: REST surface for lookupplayer.php.
      operations:
      - method: GET
        name: lookupplayer
        description: Lookup Player
        call: thesportsdb-lookup.lookupplayer
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookuptable-php
      name: lookuptable-php
      description: REST surface for lookuptable.php.
      operations:
      - method: GET
        name: lookuptable
        description: Lookup Table
        call: thesportsdb-lookup.lookuptable
        with:
          l: rest.l
          s: rest.s
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lookupteam-php
      name: lookupteam-php
      description: REST surface for lookupteam.php.
      operations:
      - method: GET
        name: lookupteam
        description: Lookup Team
        call: thesportsdb-lookup.lookupteam
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: thesportsdb-lookup-mcp
    port: 9090
    transport: http
    description: MCP adapter for TheSportsDB API — Lookup. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: lookup-event
      description: Lookup Event
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-lookup.lookupevent
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: lookup-league
      description: Lookup League
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-lookup.lookupleague
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: lookup-player
      description: Lookup Player
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-lookup.lookupplayer
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: lookup-table
      description: Lookup Table
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-lookup.lookuptable
      with:
        l: tools.l
        s: tools.s
      outputParameters:
      - type: object
        mapping: $.
    - name: lookup-team
      description: Lookup Team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thesportsdb-lookup.lookupteam
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
