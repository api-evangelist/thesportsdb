naftiko: "1.0.0-alpha1"

info:
  label: "TheSportsDB API"
  description: "Open, crowd-sourced sports database providing data on leagues, teams, players, events, venues, and standings across hundreds of sports worldwide."
  tags:
    - Sports
    - Teams
    - Players
    - Events
    - Leagues
    - Free
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      SPORTSDB_API_KEY: SPORTSDB_API_KEY

capability:
  consumes:
    - type: http
      namespace: sportsdb
      baseUri: https://www.thesportsdb.com/api/v1/json/{{SPORTSDB_API_KEY}}
      description: "TheSportsDB API v1 — use '3' as key for free tier."
      resources:
        - name: search-teams
          path: /searchteams.php
          description: "Search sports teams by name."
          operations:
            - name: search-teams
              method: GET
              description: "Search for sports teams by name or abbreviation."
              inputParameters:
                - name: t
                  in: query
                  type: string
                  required: false
                  description: "Team name."
                - name: sname
                  in: query
                  type: string
                  required: false
                  description: "Short name/abbreviation."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: search-players
          path: /searchplayers.php
          description: "Search athletes by name or team."
          operations:
            - name: search-players
              method: GET
              description: "Search for sports players by name or team."
              inputParameters:
                - name: t
                  in: query
                  type: string
                  required: false
                  description: "Team name."
                - name: p
                  in: query
                  type: string
                  required: false
                  description: "Player name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: search-events
          path: /searchevents.php
          description: "Search sports events."
          operations:
            - name: search-events
              method: GET
              description: "Search for sports events by name or season."
              inputParameters:
                - name: e
                  in: query
                  type: string
                  required: false
                  description: "Event name."
                - name: s
                  in: query
                  type: string
                  required: false
                  description: "Season."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: all-leagues
          path: /all_leagues.php
          description: "List all sports leagues."
          operations:
            - name: list-all-leagues
              method: GET
              description: "Get all sports leagues in the database."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: search-all-teams
          path: /search_all_teams.php
          description: "List teams in a league."
          operations:
            - name: list-all-teams
              method: GET
              description: "Get all teams in a specific league."
              inputParameters:
                - name: l
                  in: query
                  type: string
                  required: false
                  description: "League name."
                - name: s
                  in: query
                  type: string
                  required: false
                  description: "Sport name."
                - name: c
                  in: query
                  type: string
                  required: false
                  description: "Country name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: lookup-team
          path: /lookupteam.php
          description: "Look up team by ID."
          operations:
            - name: lookup-team
              method: GET
              description: "Get detailed data for a specific team."
              inputParameters:
                - name: id
                  in: query
                  type: integer
                  required: true
                  description: "Team ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: lookup-player
          path: /lookupplayer.php
          description: "Look up player by ID."
          operations:
            - name: lookup-player
              method: GET
              description: "Get detailed data for a specific player."
              inputParameters:
                - name: id
                  in: query
                  type: integer
                  required: true
                  description: "Player ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: events-next
          path: /eventsnext.php
          description: "Next 5 events for a team."
          operations:
            - name: get-next-team-events
              method: GET
              description: "Get the next 5 upcoming events for a team."
              inputParameters:
                - name: id
                  in: query
                  type: integer
                  required: true
                  description: "Team ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: events-last
          path: /eventslast.php
          description: "Last 5 events for a team."
          operations:
            - name: get-last-team-events
              method: GET
              description: "Get the last 5 previous events for a team."
              inputParameters:
                - name: id
                  in: query
                  type: integer
                  required: true
                  description: "Team ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: events-season
          path: /eventsseason.php
          description: "All events in a season for a league."
          operations:
            - name: get-season-events
              method: GET
              description: "Get all events for a league in a season."
              inputParameters:
                - name: id
                  in: query
                  type: integer
                  required: true
                  description: "League ID."
                - name: s
                  in: query
                  type: string
                  required: false
                  description: "Season (e.g., 2026-2027)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: lookup-table
          path: /lookuptable.php
          description: "League standings table."
          operations:
            - name: lookup-table
              method: GET
              description: "Get the standings table for a league season."
              inputParameters:
                - name: l
                  in: query
                  type: integer
                  required: true
                  description: "League ID."
                - name: s
                  in: query
                  type: string
                  required: false
                  description: "Season."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: all-sports
          path: /all_sports.php
          description: "List all sports."
          operations:
            - name: list-all-sports
              method: GET
              description: "Get all sports categories in the database."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sportsdb-rest
      resources:
        - path: /v1/teams/search
          name: team-search
          description: "Search for teams."
          operations:
            - method: GET
              name: search-teams
              description: "Search teams by name."
              call: "sportsdb.search-teams"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/teams/{id}
          name: team
          description: "Team lookup."
          operations:
            - method: GET
              name: lookup-team
              description: "Get team by ID."
              call: "sportsdb.lookup-team"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/teams/{id}/events/next
          name: team-next-events
          description: "Upcoming team events."
          operations:
            - method: GET
              name: get-next-events
              description: "Get next 5 events for a team."
              call: "sportsdb.get-next-team-events"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/leagues
          name: leagues
          description: "All leagues."
          operations:
            - method: GET
              name: list-leagues
              description: "List all leagues."
              call: "sportsdb.list-all-leagues"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: sportsdb-mcp
      transport: http
      tools:
        - name: search-teams
          description: "Search for sports teams by name or abbreviation."
          hints:
            readOnly: true
            idempotent: true
          call: "sportsdb.search-teams"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-all-leagues
          description: "List all sports leagues in TheSportsDB."
          hints:
            readOnly: true
            idempotent: true
          call: "sportsdb.list-all-leagues"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-teams-in-league
          description: "List all teams in a specific sports league."
          hints:
            readOnly: true
            idempotent: true
          call: "sportsdb.list-all-teams"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-next-team-events
          description: "Get the next 5 upcoming events for a sports team."
          hints:
            readOnly: true
            idempotent: true
          call: "sportsdb.get-next-team-events"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-last-team-events
          description: "Get the last 5 completed events for a sports team."
          hints:
            readOnly: true
            idempotent: true
          call: "sportsdb.get-last-team-events"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-season-events
          description: "Get all events for a league in a specific season."
          hints:
            readOnly: true
            idempotent: true
          call: "sportsdb.get-season-events"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-league-standings
          description: "Get the current standings/table for a league season."
          hints:
            readOnly: true
            idempotent: true
          call: "sportsdb.lookup-table"
          with:
            l: "tools.l"
          outputParameters:
            - type: object
              mapping: "$."

        - name: search-players
          description: "Search for sports players by name or team."
          hints:
            readOnly: true
            idempotent: true
          call: "sportsdb.search-players"
          outputParameters:
            - type: object
              mapping: "$."

        - name: lookup-player
          description: "Get detailed data for a specific player by ID."
          hints:
            readOnly: true
            idempotent: true
          call: "sportsdb.lookup-player"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
